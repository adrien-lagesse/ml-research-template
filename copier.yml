# Questions and settings for generating a project from ml-research-template.
# Run: uvx copier copy gh:adrien-lagesse/ml-research-template <destination>
# Update later: uvx copier update   (from inside a generated project)

_subdirectory: template

# Opt-in templating: only files whose name ends in ".jinja" are rendered (the
# suffix is stripped on output). Everything else is copied byte-for-byte. Only
# pyproject.toml, README.md, and CLAUDE.md are templated.
_templates_suffix: ".jinja"

_answers_file: .copier-answers.yml

project_title:
  type: str
  help: "Project name. Used as the pyproject name and the README/CLAUDE.md heading. Use kebab-case, e.g. my-research."
  placeholder: "my-research"

project_description:
  type: str
  help: "One-sentence description. Used as the pyproject description and the opening line of README.md and CLAUDE.md."
  placeholder: "Code for <what the project does>."
