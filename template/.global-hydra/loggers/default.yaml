# @package loggers
# The loggers every experiment shares. Defined once here and pulled in with
# `- /loggers: default`; experiment_name and run_name interpolate the run's
# top-level names, so an experiment names its run without retyping them.
- _target_: core.logger.TerminalLogger
- _target_: core.logger.LocalLogger
  experiment_name: ${experiment_name}
  run_name: ${run_name}
  root: ${oc.env:LOG_ROOT}
  checkpointing: true # LocalLogger owns every on-disk file: metrics, summaries, checkpoints
- _target_: core.logger.MLflowLogger # metrics + params dashboard; MLFLOW_TRACKING_URI (paths.env) picks the store
  experiment_name: ${experiment_name}
  run_name: ${run_name}
  artifacts: false # flip to upload checkpoints and summaries as run artifacts too
