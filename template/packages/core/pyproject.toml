[project]
name = "core"
version = "0.0.0"
description = "Modular experiment scaffold: the TensorDict data contract, Data, and metric primitives."
requires-python = ">=3.14"
dependencies = [
    "einops>=0.8.2",
    "jaxtyping>=0.3.11",
    "mlflow>=3.14.0",
    "safetensors>=0.8.0",
    "tensordict>=0.13.0",
    "torch>=2.12.1",
]

[build-system]
requires = ["uv_build>=0.8.0,<0.12.0"]
build-backend = "uv_build"
