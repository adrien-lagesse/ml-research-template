[project]
name = "dummy-regression"
version = "0.0.0"
description = "A tiny supervised-regression example that wires the core scaffold end to end."
requires-python = ">=3.14"
dependencies = [
    "core",
    "einops>=0.8.2",
    "jaxtyping>=0.3.11",
    "tensordict>=0.13.0",
    "torch>=2.12.1",
]

[build-system]
requires = ["uv_build>=0.8.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
core = { workspace = true }
