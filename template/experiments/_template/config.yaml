# @package _global_
defaults:
  - /base
  - /optimizer: adamw
  - /scheduler: cosine
  - /loggers: default
  - /callbacks: default
  - _self_

experiment_name: __NAME__
run_name: baseline

seed: 0
device: cpu
total_steps: 10000 # optimizer steps; the run length and the cosine T_max
batch_size: 64
log_every_steps: 50 # train-loss logging cadence, in global steps
checkpoint_every_steps: 1000 # resume-checkpoint cadence, in global steps

evals:
  validation:
    steps: 200
  test:
    at_end: true

# ??? marks the fields every experiment must fill in.
data:
  _target_: ???

model:
  _target_: ???

loss:
  _target_: ???

metrics:
  _target_: core.metrics.MetricCollection
  metrics: []
