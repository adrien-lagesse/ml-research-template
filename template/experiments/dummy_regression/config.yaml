# @package _global_
defaults:
  - /base
  - /optimizer: adamw
  - /scheduler: cosine
  - /loggers: default
  - /callbacks: default

  - /model: small_mlp
  - _self_

experiment_name: dummy_regression
run_name: baseline

seed: 0
device: cpu
total_steps: 12800
batch_size: 64
log_every_steps: 50 # train-loss logging cadence, in global steps
checkpoint_every_steps: 1600 # resume-checkpoint cadence, in global steps

data:
  _target_: dummy_regression.SyntheticRegression
  n_features: 8
  n_targets: 1
  n_train: 1024
  n_val: 256
  n_test: 256
  noise_std: 0.1
  dataset_seed: ${seed}
  dataloader_seed: ${seed}
  batch_size: ${batch_size}

loss:
  _target_: dummy_regression.MSELoss

metrics:
  _target_: core.metrics.MetricCollection
  metrics:
    - _target_: core.metrics.MeanAbsoluteError
    - _target_: core.metrics.ExplainedVariance

evals:
  validation:
    steps: 200
  test:
    at_end: true
