[pytest]
# Collect from every workspace member: tests/ files and src/ doctests alike.
testpaths = packages

addopts =
    --import-mode=importlib
    --strict-markers
    --strict-config
    --doctest-modules
    -ra

# Tensor/array reprs are whitespace- and precision-fragile; let doctests use
# `tensor([...])` and ignore how multi-line output wraps.
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# An xfail that passes is a failure — the bug is fixed, so the mark must go.
xfail_strict = true

# Declared up front so --strict-markers accepts them.
markers =
    slow: long-running tests (training loops, integration); deselect with -m "not slow"
    gpu: requires a CUDA device
